version: "3.8"

services:
  news-server:
    build: .
    command: python -m servers.news_server.server --transport sse --port 8001
    ports:
      - "8001:8001"
    environment:
      - PYTHONPATH=/app

  mineral-pdf-server:
    build: .
    command: python -m servers.mineral_pdf_server.server --transport sse --port 8002
    ports:
      - "8002:8002"
    environment:
      - PYTHONPATH=/app

  price-server:
    build: .
    command: python -m servers.price_server.server --transport sse --port 8003
    ports:
      - "8003:8003"
    environment:
      - PYTHONPATH=/app

  agent:
    build: .
    command: python -m client.agent --transport sse
    depends_on:
      - news-server
      - mineral-pdf-server
      - price-server
    ports:
      - "8080:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MCP_BASE_URL=http://localhost
      - PYTHONPATH=/app
